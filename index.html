<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
         <div class="container">
    <form action="#" method="GET"></form>
        <h1>Welcome Back !</h1>
        <input class="info" type="text" placeholder="First Name" id="first-name" name="first-name" required> 
        <input class="info" type="text" placeholder="Last Name" id="last-name" name="last-name" required>
        <input class="info" type="email" placeholder="Email"  id="email" name="email" required> 
         <input class="info" type="password" placeholder="Password"  id="password" name="password" required> 
        <select class="info" id="country">
            <option>India</option>
            <option>United States</option>
            <option>UAE</option>
        </select>
        <input type="checkbox" name="termsAndConditions" class="info" id="TC" checked> 
        <label id="label" for="TC"><p>I agree to <a href="#">Terms Of Conditions</a>and <a href="#">Privacy Policy</a>of corporation</p></label>
        <button type="submit">Login</button>
    </form>
   </div>
</body>
</html>
